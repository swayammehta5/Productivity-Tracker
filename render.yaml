services:
  - type: web
    name: habit-tracker-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Required in Render Dashboard: FRONTEND_URL, JWT_SECRET, MONGODB_URI, GOOGLE_CLIENT_ID

  - type: web
    name: habit-tracker-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        value: https://habit-tracker-backend.onrender.com/api
      # Required: Add REACT_APP_GOOGLE_CLIENT_ID in Render Dashboard

